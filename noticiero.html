<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticiero - Arcaraz</title>

<link rel="icon" href="assets/favicon.ico">

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* FONDO */
body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.1), transparent 40%);
  z-index:-1;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px 60px;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
}

nav img{height:50px;}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 2s infinite alternate;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  justify-content:center;
  padding:50px;
}

/* CARD */
.card{
  width:280px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  border:1px solid rgba(255,0,0,0.2);
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:translateY(-10px) scale(1.05);
  box-shadow:0 0 30px red;
}

/* MEDIA */
.card img,
.card video,
.card iframe{
  width:100%;
}

/* CONTENIDO */
.card-content{
  padding:15px;
}

.card h3{
  color:red;
  margin-bottom:10px;
}

.card p{
  color:#ccc;
  font-size:14px;
}

/* VISTAS */
.views{
  display:flex;
  align-items:center;
  gap:6px;
  color:#aaa;
  margin-top:10px;
}

.views span{
  transition:0.3s;
}

/* ANIMACION VISTAS */
.bump{
  color:red;
  transform:scale(1.3);
  text-shadow:0 0 10px red;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}

.modal img,
.modal video,
.modal iframe{
  max-width:90%;
  max-height:80%;
  border-radius:20px;
  box-shadow:0 0 50px red;
}

/* ANIM */
@keyframes glow{
  from{filter:drop-shadow(0 0 10px red);}
  to{filter:drop-shadow(0 0 30px red);}
}
</style>
</head>

<body>

<nav>
  <img src="assets/logo.png">
</nav>

<div class="hero">
  <h1>NOTICIERO</h1>
</div>

<div class="grid" id="news"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnL_0Xc9ekk_kBcp-wCTBDAhQVu2u4wz4",
  authDomain: "vps1-ec6a1.firebaseapp.com",
  projectId: "vps1-ec6a1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("news");

/* CARGAR NOTICIAS */
onSnapshot(collection(db,"news"), snapshot=>{
  container.innerHTML = "";

  snapshot.forEach(docSnap=>{
    const data = docSnap.data();
    const id = docSnap.id;

    let media = "";

    if(data.video && data.video.includes("youtube")){
      const vid = data.video.split("v=")[1]?.split("&")[0];
      media = `<iframe src="https://www.youtube.com/embed/${vid}"></iframe>`;
    }
    else if(data.video){
      media = `<video src="${data.video}" muted></video>`;
    }
    else if(data.image){
      media = `<img src="${data.image}">`;
    }

    container.innerHTML += `
      <div class="card" onclick='openModal(${JSON.stringify(data)}, "${id}")'>
        ${media}
        <div class="card-content">
          ${data.title ? `<h3>${data.title}</h3>` : ""}
          ${data.text ? `<p>${data.text}</p>` : ""}

          <div class="views">
            👁️ <span data-id="${id}">${data.views || 0}</span>
          </div>
        </div>
      </div>
    `;
  });
});

/* MODAL + SUMAR VISTA */
window.openModal = async function(data, id){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  let media = "";

  if(data.video && data.video.includes("youtube")){
    const vid = data.video.split("v=")[1]?.split("&")[0];
    media = `<iframe src="https://www.youtube.com/embed/${vid}" allowfullscreen></iframe>`;
  }
  else if(data.video){
    media = `<video src="${data.video}" controls autoplay></video>`;
  }
  else if(data.image){
    media = `<img src="${data.image}">`;
  }

  content.innerHTML = `
    ${media}
    ${data.title ? `<h3 style="color:red;margin-top:20px;">${data.title}</h3>` : ""}
    ${data.text ? `<p style="color:#ccc;">${data.text}</p>` : ""}
  `;

  modal.style.display="flex";

  /* SUMAR VISTA EN FIREBASE */
  const ref = doc(db,"news",id);
  await updateDoc(ref,{
    views: increment(1)
  });

  /* ACTUALIZAR EN PANTALLA INSTANTE */
  const el = document.querySelector(`[data-id="${id}"]`);
  if(el){
    let num = parseInt(el.innerText) || 0;
    el.innerText = num + 1;

    el.classList.add("bump");
    setTimeout(()=>el.classList.remove("bump"),300);
  }
}

window.closeModal = function(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
