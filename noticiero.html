<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticiero - Arcaraz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* FONDO */
body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.1), transparent 40%);
  z-index:-1;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:70px;
  background:linear-gradient(90deg,#ff0000,#ff4d4d);
  -webkit-background-clip:text;
  color:transparent;
  animation:glow 2s infinite alternate;
}

.hero p{
  color:#aaa;
  margin-top:10px;
}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  justify-content:center;
  padding:50px;
}

/* CARD */
.card{
  width:320px;
  background:rgba(20,20,20,0.8);
  border-radius:20px;
  overflow:hidden;
  backdrop-filter:blur(10px);
  border:1px solid rgba(255,0,0,0.2);
  transition:0.4s;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px red;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-content{
  padding:15px;
}

.card h3{
  color:#ff0000;
  margin-bottom:10px;
}

.card p{
  color:#ccc;
  font-size:14px;
}

/* ANIMACION */
@keyframes glow{
  from{filter:drop-shadow(0 0 5px red);}
  to{filter:drop-shadow(0 0 25px red);}
}
</style>
</head>

<body>

<div class="hero">
  <h1>NOTICIERO</h1>
  <p>Actualizaciones en tiempo real</p>
</div>

<div class="grid" id="news"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnL_0Xc9ekk_kBcp-wCTBDAhQVu2u4wz4",
  authDomain: "vps1-ec6a1.firebaseapp.com",
  projectId: "vps1-ec6a1",
  storageBucket: "vps1-ec6a1.firebasestorage.app",
  messagingSenderId: "204349845179",
  appId: "1:204349845179:web:d864250ace6c7b72b9439e",
  measurementId: "G-07PRMWGY3E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("news");

onSnapshot(collection(db,"news"), snapshot=>{
  container.innerHTML = "";

  snapshot.forEach(doc=>{
    const data = doc.data();

    container.innerHTML += `
      <div class="card">
        <img src="${data.image}">
        <div class="card-content">
          ${data.title ? `<h3>${data.title}</h3>` : ""}
          ${data.text ? `<p>${data.text}</p>` : ""}
        </div>
      </div>
    `;
  });
});
</script>

</body>
</html>
