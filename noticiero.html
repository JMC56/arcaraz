<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Noticiero - Arcaraz</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Orbitron',sans-serif;}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* FONDO */
body::before{
  content:'';
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.2), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.1), transparent 40%);
  z-index:-1;
}

/* HERO */
.hero{
  text-align:center;
  padding:120px 20px;
}

.hero h1{
  font-size:70px;
  color:#ff0000;
  text-shadow:0 0 20px red,0 0 60px red;
  animation:glow 2s infinite alternate;
}

.hero p{color:#aaa;}

/* GRID */
.grid{
  display:flex;
  flex-wrap:wrap;
  gap:30px;
  justify-content:center;
  padding:50px;
}

/* CARD */
.card{
  width:260px;
  background:#111;
  border-radius:15px;
  overflow:hidden;
  border:1px solid rgba(255,0,0,0.2);
  transition:0.4s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px red;
}

/* MEDIA */
.card img,
.card video{
  width:100%;
  height:auto;
  object-fit:contain;
}

.card-content{padding:10px;}
.card h3{color:red;}
.card p{color:#ccc;font-size:13px;}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:9999;
  flex-direction:column;
}

.modal img,
.modal video,
.modal iframe{
  max-width:90%;
  max-height:80%;
  border-radius:20px;
  box-shadow:0 0 50px red;
}

/* ANIM */
@keyframes glow{
  from{filter:drop-shadow(0 0 10px red);}
  to{filter:drop-shadow(0 0 30px red);}
}
</style>
</head>

<body>

<div class="hero">
  <h1>NOTICIERO</h1>
  <p>Actualizaciones en tiempo real</p>
</div>

<div class="grid" id="news"></div>

<div class="modal" id="modal" onclick="closeModal()">
  <div id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCnL_0Xc9ekk_kBcp-wCTBDAhQVu2u4wz4",
  authDomain: "vps1-ec6a1.firebaseapp.com",
  projectId: "vps1-ec6a1",
  storageBucket: "vps1-ec6a1.firebasestorage.app",
  messagingSenderId: "204349845179",
  appId: "1:204349845179:web:d864250ace6c7b72b9439e",
  measurementId: "G-07PRMWGY3E"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const container = document.getElementById("news");

onSnapshot(collection(db,"news"), snapshot=>{
  container.innerHTML = "";

  snapshot.forEach(doc=>{
    const data = doc.data();

    let media = "";

    // VIDEO YOUTUBE
    if(data.video && data.video.includes("youtube")){
      const videoId = data.video.split("v=")[1]?.split("&")[0];
      media = `<iframe src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen></iframe>`;
    }
    // VIDEO NORMAL
    else if(data.video){
      media = `<video src="${data.video}" controls></video>`;
    }
    // IMAGEN
    else if(data.image){
      media = `<img src="${data.image}">`;
    }

    container.innerHTML += `
      <div class="card" onclick='openModal(${JSON.stringify(data)})'>
        ${media}
        <div class="card-content">
          ${data.title ? `<h3>${data.title}</h3>` : ""}
          ${data.text ? `<p>${data.text}</p>` : ""}
        </div>
      </div>
    `;
  });
});

/* MODAL */
window.openModal = function(data){
  const modal = document.getElementById("modal");
  const content = document.getElementById("modalContent");

  let media = "";

  if(data.video && data.video.includes("youtube")){
    const videoId = data.video.split("v=")[1]?.split("&")[0];
    media = `<iframe src="https://www.youtube.com/embed/${videoId}" allowfullscreen></iframe>`;
  }
  else if(data.video){
    media = `<video src="${data.video}" controls autoplay></video>`;
  }
  else if(data.image){
    media = `<img src="${data.image}">`;
  }

  content.innerHTML = `
    ${media}
    ${data.title ? `<h3 style="color:red;margin-top:20px;">${data.title}</h3>` : ""}
    ${data.text ? `<p style="color:#ccc;">${data.text}</p>` : ""}
  `;

  modal.style.display="flex";
}

window.closeModal = function(){
  document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
